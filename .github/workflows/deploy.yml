name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is missing"; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is missing"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is missing"; exit 1; fi

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # We skip ssh-keyscan because it's timing out in some environments.
          # We use -o StrictHostKeyChecking=no in the rsync/ssh steps instead.

      - name: Copy project files to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'dist' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -v" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/yelp-prototype/

      - name: Create env file and deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY'

          cd ~/yelp-prototype

          # Ensure swap file exists to prevent OOM during build
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi

          # Write production env file from github secrets
          cat > .env.production << EOF
          MONGO_URI=${{ secrets.MONGO_URI }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }},http://localhost:5173
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          EOF

          # Build and start all services (limited to 1 build at a time to save RAM)
          sudo docker compose --env-file .env.production build --no-cache --parallel 1
          sudo docker compose --env-file .env.production up -d

          # Wait a moment then show status
          sleep 10
          sudo docker compose ps

          DEPLOY

      - name: Print app URL
        run: |
          echo "==========================================="
          echo "App deployed to: http://${{ secrets.EC2_HOST }}"
          echo "==========================================="

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key