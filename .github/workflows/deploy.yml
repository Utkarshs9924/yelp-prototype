name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is missing"; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is missing"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is missing"; exit 1; fi

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Write .env.production locally
        run: |
          cat > .env.production << EOF
          MONGO_URI=${{ secrets.MONGO_URI }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }},http://localhost:5173
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          EOF

      - name: Copy project files to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'dist' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/yelp-prototype/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << DEPLOY

          cd ~/yelp-prototype

          if [ ! -f /swapfile ]; then
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi

          sudo docker compose --env-file .env.production build --parallel 1
          sudo docker compose --env-file .env.production up -d

          sleep 10
          sudo docker compose ps
          sudo docker compose logs backend --tail=50

          DEPLOY

      - name: Print app URL
        run: |
          echo "==========================================="
          echo "App deployed to: http://${{ secrets.EC2_HOST }}"
          echo "==========================================="

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key